services:
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - VERSION=docker
      - PLEX_CLAIM=
    volumes:
      - ./config/plex:/config
      - /mnt/nas/Television:/tv
      - /mnt/nas/Movies:/movies
      - /mnt/nas/Music:/music
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - ./config/sonarr:/config
      - /mnt/nas/Television:/tv
      - ./downloads:/downloads
    ports:
      - 38080:8989
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - ./config/radarr:/config
      - /mnt/nas/Movies:/movies
      - ./downloads:/downloads
    ports:
      - 38081:7878
    restart: unless-stopped

  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - ./config/lidarr:/config
      - /mnt/nas/Music:/music
      - ./downloads:/downloads
    ports:
      - 38082:8686
    restart: unless-stopped

  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - ./config/sabnzbd:/config
      - ./downloads:/downloads
      - ./downloads/incomplete:/incomplete-downloads
    ports:
      - 8080:8080
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - WEBUI_PORT=8081
    volumes:
      - ./config/qbittorrent:/config
      - ./downloads:/downloads
    ports:
      - 8081:8081
      - 6881:6881
      - 6881:6881/udp
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - ./config/prowlarr:/config
    ports:
      - 9696:9696
    restart: unless-stopped

  livrarr:
    image: ghcr.io/kkodecs/livrarr:0.1.0-alpha5
    container_name: livrarr
    volumes:
      - ./config/livrarr:/config
      - /mnt/nas/Audiobooks:/books
      - ./downloads:/downloads
    ports:
      - 38083:8789
    restart: unless-stopped

  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    environment:
      - TZ=America/New_York
    volumes:
      - ./config/audiobookshelf:/config
      - ./config/audiobookshelf-metadata:/metadata
      - /mnt/nas/Audiobooks:/audiobooks
      - /mnt/nas/Backups/audiobookshelf:/backups
    ports:
      - 13378:80
    restart: unless-stopped

  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    environment:
      - TZ=America/New_York
      - FTLCONF_webserver_api_password=
      - FTLCONF_LOCAL_IPV4=10.0.0.50
    volumes:
      - ./config/pihole:/etc/pihole
      - ./config/dnsmasq.d:/etc/dnsmasq.d
    ports:
      - 53:53/tcp
      - 53:53/udp
      - 8053:80/tcp
    dns:
      - 127.0.0.1
      - 1.1.1.1
    restart: unless-stopped
    cap_add:
      - NET_ADMIN

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config/portainer:/data
    ports:
      - 9000:9000
      - 9443:9443

volumes:
  plex_config:
  sonarr_config:
  radarr_config:
  lidarr_config:
  sabnzbd_config:
  qbittorrent_config:
  prowlarr_config:
