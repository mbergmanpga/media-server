<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Media Server</title>

  <!-- Add-to-home-screen / PWA niceties -->
  <meta name="theme-color" content="#0b1220" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Media Server" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8E%AC%3C/text%3E%3C/svg%3E" />

  <style>
    :root {
      --bg: #0b1220;
      --bg-2: #111a2e;
      --card: rgba(255, 255, 255, 0.05);
      --card-hover: rgba(255, 255, 255, 0.09);
      --border: rgba(255, 255, 255, 0.10);
      --text: #e8eefc;
      --muted: #93a1c0;
      --accent: #6aa3ff;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 80% -10%, #1b2c52 0%, transparent 60%),
        radial-gradient(1000px 500px at -10% 110%, #16233f 0%, transparent 55%),
        var(--bg);
      min-height: 100vh;
      padding: max(env(safe-area-inset-top), 18px) 16px calc(env(safe-area-inset-bottom) + 32px);
    }

    .wrap { max-width: 640px; margin: 0 auto; }

    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 4px 22px;
    }
    header .logo {
      font-size: 34px;
      line-height: 1;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,.4));
    }
    header h1 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }
    header p { margin: 2px 0 0; font-size: 13px; color: var(--muted); }

    .group { margin-bottom: 26px; }
    .group-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin: 0 6px 12px;
    }
    .group-title::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    @media (min-width: 520px) { .grid { grid-template-columns: repeat(3, 1fr); } }

    .card {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 14px;
      border-radius: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      min-height: 96px;
    }
    .card:active { transform: scale(0.97); }
    @media (hover: hover) {
      .card:hover { background: var(--card-hover); border-color: rgba(106,163,255,.4); transform: translateY(-2px); }
    }

    .card .icon {
      font-size: 26px;
      line-height: 1;
    }
    .card .name { font-size: 15px; font-weight: 600; }
    .card .desc { font-size: 12px; color: var(--muted); line-height: 1.35; }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      margin-top: 12px;
    }
    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <span class="logo">🎬</span>
      <div>
        <h1>Media Server</h1>
        <p>Beelink · 10.0.0.50 · Tailscale / LAN</p>
      </div>
    </header>

    <div id="app"></div>

    <footer>
      <a href="checklist.html">Packing checklist →</a>
    </footer>
  </div>

  <script>
    // Single source of truth — edit here to add/remove services.
    const HOST = "http://10.0.0.50";
    const groups = [
      {
        title: "Watch & Listen",
        services: [
          { icon: "🍿", name: "Plex",            desc: "Movies, TV & music streaming", path: ":32400/web" },
          { icon: "🎧", name: "Audiobookshelf",  desc: "Audiobooks (Prologue app)",     path: ":13378/audiobookshelf" },
          { icon: "📖", name: "Calibre-Web",     desc: "Ebook reader & Send to Kindle", path: ":38084" },
        ],
      },
      {
        title: "Library Managers",
        services: [
          { icon: "📺", name: "Sonarr",   desc: "TV shows",            path: ":38080" },
          { icon: "🎞️", name: "Radarr",   desc: "Movies",              path: ":38081" },
          { icon: "🎵", name: "Lidarr",   desc: "Music (on-demand)",   path: ":38082" },
          { icon: "📚", name: "Livrarr",  desc: "Audiobooks & ebooks", path: ":38083" },
          { icon: "🔎", name: "Prowlarr", desc: "Indexer manager",     path: ":9696" },
        ],
      },
      {
        title: "Downloads",
        services: [
          { icon: "📥", name: "SABnzbd",     desc: "Usenet (primary)",  path: ":8080" },
          { icon: "🧲", name: "qBittorrent", desc: "Torrents (backup)", path: ":8081" },
        ],
      },
      {
        title: "Network & System",
        services: [
          { icon: "🛡️", name: "Pi-hole",   desc: "DNS ad-blocking",   path: ":8053/admin" },
          { icon: "🐳", name: "Portainer", desc: "Container manager", path: ":9000" },
        ],
      },
    ];

    const app = document.getElementById("app");
    app.innerHTML = groups.map(g => `
      <section class="group">
        <h2 class="group-title">${g.title}</h2>
        <div class="grid">
          ${g.services.map(s => `
            <a class="card" href="${HOST}${s.path}">
              <span class="icon">${s.icon}</span>
              <span class="name">${s.name}</span>
              <span class="desc">${s.desc}</span>
            </a>
          `).join("")}
        </div>
      </section>
    `).join("");
  </script>
</body>
</html>
